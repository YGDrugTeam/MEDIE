trigger:
- main
- dev

pool:
  vmImage: ubuntu-latest

variables:
  imageName: medichubs-backend
  acrName: medichubsacr
  acrLoginServer: medichubsacr.azurecr.io

stages:
- stage: Build
  jobs:
  - job: BuildAndPush
    steps:
    - checkout: self

    - task: Docker@2
      inputs:
        containerRegistry: 'ACR_SERVICE_CONNECTION'
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: backend/Dockerfile
        tags: |
          $(Build.BuildId)

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployToAKS
    steps:
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        kubernetesServiceEndpoint: 'AKS_SERVICE_CONNECTION'
        command: apply
        useConfigurationFile: true
        configuration: k8s/
